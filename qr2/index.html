<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qr2 redirect</title>
  <style>
    body {
      margin: 0;
      font-family: "Candara", "Trebuchet MS", sans-serif;
      background: #f7f4ef;
      color: #1a1a1a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border: 1px solid #e3ddd2;
      padding: 24px 28px;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
      max-width: 520px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #6c655c;
    }

    .target {
      margin-top: 8px;
      word-break: break-all;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Redirecting</div>
    <div class="target" id="redirect-target">Checking destination...</div>
  </div>
  <script>
    (function() {
      var FALLBACK_URL = "";
      var url = FALLBACK_URL;

      var target = document.getElementById("redirect-target");
      if (target) {
        target.textContent = url ? url : "No destination set";
      }

      if (url) {
        window.location.replace(url);
      }
    })();
  </script>
</body>
</html>
